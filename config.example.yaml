# SmartInbox configuration
# Copy to config.yaml next to this file

port: 8090
host: "127.0.0.1"
timezone: America/New_York
data_dir: data

gmail:
  poll_interval: 60.0          # seconds between inbox checks (overridable in Settings UI)
  max_fetch: 20                # max unread messages per poll

ollama:
  # ollama-gpu0 on host GPU 0 (:11435) — share qwen2.5:3b with frigate-tui / tri-tone-chat
  base_url: http://127.0.0.1:11435
  model: qwen2.5:3b
  main_gpu: 0                # host GPU index; dedicated Ollama containers use device 0 only
  timeout: 120
  prompts_dir: prompts    # saved LLM system prompts (.txt)

spam:
  threshold: 5.0             # score at or above = spam (SpamAssassin default)
  command: null              # optional path to spamassassin/spamc; auto-detect if omitted
  use_spamd: false           # true = talk to spamd daemon via spamc (faster at volume)
  spamd_host: 127.0.0.1
  spamd_port: 783
  timeout: 30

self_heal:
  enabled: true
  interval_sec: 300          # background check interval
  ollama_cooldown_sec: 600   # min gap between Ollama warm + pipeline kickstarts
  tts_restart_cooldown_sec: 1800  # min gap between Chatterbox docker restarts
  calendar_days: 30          # lookback when resuming stalled calendar workers

calendar:
  extract_concurrency: 6   # parallel Ollama calls during Check for Events (1–32)
  ollama_main_gpu: 0       # calendar text LLM (inherits ollama.main_gpu if omitted)

chatterbox_tts:
  enabled: true
  base_url: http://127.0.0.1:8004
  docker_container: chatterbox-tts-server-cu128   # optional; enables Pipelines → Restart Chatterbox
  voice_mode: clone
  reference_audio_filename: reference.wav   # MP3/WAV in Chatterbox reference-audio directory
  predefined_voice_id: ""
  output_format: wav
  split_text: true
  timeout: 120
  cache_dir: localrecordings
  alerts_enabled: true
  alert_cooldown: 120          # seconds between spoken alerts (overridable in Settings UI)
  alert_template: "New email from {sender}. {subject}"
  default_test_message: "New email from example at gmail dot com. Your package has shipped."
  # Voice summary / voice prompt: Settings → Chatterbox voice (saved in .event_voice.json + DB)