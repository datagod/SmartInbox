<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 44" role="img" aria-label="MailCraft scene">
  <defs>
    <pattern id="ft-grass" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#6b4423"/>
      <rect width="16" height="6" fill="#5d9e45"/>
      <rect x="1" y="2" width="3" height="2" fill="#7cbd56"/>
      <rect x="8" y="1" width="4" height="2" fill="#4a8a32"/>
      <rect x="12" y="4" width="2" height="1" fill="#8ed65f"/>
    </pattern>
    <pattern id="ft-stone" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#7a7a7a"/>
      <rect width="8" height="8" fill="#8b8b8b"/>
      <rect x="8" y="8" width="8" height="8" fill="#6e6e6e"/>
    </pattern>
    <pattern id="ft-wood" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#8b6914"/>
      <rect x="0" y="3" width="16" height="3" fill="#6b4a10"/>
      <rect x="0" y="10" width="16" height="3" fill="#6b4a10"/>
    </pattern>
  </defs>
  <!-- sky -->
  <rect width="480" height="44" fill="#8ec8e8"/>
  <rect y="18" width="480" height="10" fill="#6b5a42" opacity="0.35"/>
  <!-- grass ground -->
  <rect y="28" width="480" height="16" fill="url(#ft-grass)"/>
  <rect y="28" width="480" height="2" fill="#4a8a32" opacity="0.5"/>

  <!-- blocks -->
  <rect x="8" y="20" width="16" height="8" fill="url(#ft-stone)"/>
  <rect x="8" y="20" width="16" height="2" fill="#9a9a9a"/>
  <rect x="8" y="26" width="16" height="2" fill="#4a4a4a"/>

  <rect x="52" y="12" width="16" height="16" fill="url(#ft-wood)"/>
  <rect x="52" y="12" width="16" height="2" fill="#a07828"/>
  <rect x="66" y="12" width="2" height="16" fill="#4a3010"/>

  <rect x="196" y="20" width="16" height="8" fill="#8b6914"/>
  <rect x="196" y="20" width="16" height="2" fill="#a07828"/>
  <rect x="196" y="20" width="2" height="8" fill="#c6a040"/>
  <rect x="210" y="20" width="2" height="8" fill="#4a3010"/>
  <rect x="198" y="22" width="4" height="4" fill="#3a2a10"/>
  <rect x="206" y="22" width="4" height="4" fill="#3a2a10"/>

  <rect x="248" y="16" width="16" height="12" fill="#9a9a9a"/>
  <rect x="250" y="18" width="3" height="3" fill="#4a8ac8"/>
  <rect x="256" y="20" width="3" height="3" fill="#4a8ac8"/>
  <rect x="258" y="17" width="3" height="3" fill="#4a8ac8"/>

  <rect x="400" y="12" width="16" height="16" fill="#cc4444"/>
  <rect x="400" y="12" width="16" height="4" fill="#e8e8e8"/>
  <rect x="402" y="18" width="12" height="2" fill="#e8e8e8"/>
  <rect x="402" y="22" width="12" height="2" fill="#e8e8e8"/>

  <rect x="440" y="20" width="16" height="8" fill="#5d9e45"/>
  <rect x="440" y="20" width="16" height="4" fill="#7cbd56"/>

  <!-- player (blue shirt) -->
  <g transform="translate(96,10)">
    <rect x="4" y="0" width="8" height="2" fill="#3d2314"/>
    <rect x="2" y="2" width="12" height="6" fill="#d4a574"/>
    <rect x="4" y="4" width="2" height="2" fill="#2d2d2d"/>
    <rect x="10" y="4" width="2" height="2" fill="#2d2d2d"/>
    <rect x="2" y="8" width="12" height="8" fill="#3a5a9a"/>
    <rect x="0" y="10" width="2" height="6" fill="#3a5a9a"/>
    <rect x="14" y="10" width="2" height="6" fill="#3a5a9a"/>
    <rect x="3" y="16" width="4" height="6" fill="#2a2a5a"/>
    <rect x="9" y="16" width="4" height="6" fill="#2a2a5a"/>
  </g>

  <!-- green mob -->
  <g transform="translate(148,12)">
    <rect x="2" y="4" width="12" height="12" fill="#4a9a4a"/>
    <rect x="4" y="6" width="3" height="4" fill="#1a1a1a"/>
    <rect x="11" y="6" width="3" height="4" fill="#1a1a1a"/>
    <rect x="6" y="12" width="4" height="3" fill="#1a1a1a"/>
    <rect x="3" y="16" width="4" height="4" fill="#3a7a3a"/>
    <rect x="9" y="16" width="4" height="4" fill="#3a7a3a"/>
  </g>

  <!-- villager -->
  <g transform="translate(300,10)">
    <rect x="4" y="0" width="8" height="2" fill="#4a3020"/>
    <rect x="2" y="2" width="12" height="6" fill="#c6a87c"/>
    <rect x="14" y="4" width="3" height="3" fill="#c6a87c"/>
    <rect x="1" y="8" width="14" height="10" fill="#6a4a32"/>
    <rect x="3" y="10" width="10" height="6" fill="#8a6a42"/>
    <rect x="3" y="18" width="4" height="6" fill="#4a3020"/>
    <rect x="9" y="18" width="4" height="6" fill="#4a3020"/>
  </g>

  <!-- reader with book -->
  <g transform="translate(352,10)">
    <rect x="4" y="0" width="8" height="2" fill="#5a3a22"/>
    <rect x="2" y="2" width="12" height="6" fill="#e0b888"/>
    <rect x="2" y="8" width="12" height="8" fill="#7a4a9a"/>
    <rect x="14" y="10" width="4" height="6" fill="#c6a87c"/>
    <rect x="15" y="11" width="2" height="1" fill="#2d2d2d"/>
    <rect x="3" y="16" width="4" height="6" fill="#3a2a4a"/>
    <rect x="9" y="16" width="4" height="6" fill="#3a2a4a"/>
  </g>
</svg>