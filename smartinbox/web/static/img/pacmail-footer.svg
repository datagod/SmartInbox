<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 52" role="img" aria-label="PacMail characters">
  <rect width="480" height="52" fill="#000"/>
  <!-- maze wall row -->
  <rect y="0" width="480" height="8" fill="#2121de"/>
  <rect y="0" width="480" height="2" fill="#4a4aff"/>
  <!-- pellets -->
  <g fill="#ffb897">
    <rect x="20" y="20" width="4" height="4"/><rect x="44" y="20" width="4" height="4"/>
    <rect x="68" y="20" width="4" height="4"/><rect x="92" y="20" width="4" height="4"/>
    <rect x="140" y="20" width="4" height="4"/><rect x="164" y="20" width="4" height="4"/>
    <rect x="220" y="20" width="4" height="4"/><rect x="260" y="20" width="4" height="4"/>
    <rect x="300" y="20" width="4" height="4"/><rect x="340" y="20" width="4" height="4"/>
    <rect x="380" y="20" width="4" height="4"/><rect x="420" y="20" width="4" height="4"/>
    <rect x="456" y="20" width="4" height="4"/>
  </g>
  <!-- pac-chomper (yellow) -->
  <g transform="translate(108,28)" fill="#ffe100">
    <rect x="4" y="0" width="8" height="4"/><rect x="0" y="4" width="12" height="4"/>
    <rect x="0" y="8" width="8" height="4"/><rect x="4" y="12" width="8" height="4"/>
    <rect x="8" y="8" width="8" height="8"/>
    <rect x="12" y="4" width="4" height="12"/>
    <!-- eye -->
    <rect x="10" y="6" width="2" height="2" fill="#000"/>
  </g>
  <!-- red ghost -->
  <g transform="translate(168,28)">
    <rect width="16" height="4" fill="#ff0000" rx="0"/>
    <rect x="0" y="4" width="16" height="8" fill="#ff0000"/>
    <rect x="2" y="6" width="4" height="4" fill="#fff"/><rect x="10" y="6" width="4" height="4" fill="#fff"/>
    <rect x="4" y="8" width="2" height="2" fill="#2121de"/><rect x="12" y="8" width="2" height="2" fill="#2121de"/>
    <rect x="0" y="12" width="4" height="4" fill="#ff0000"/><rect x="4" y="14" width="4" height="2" fill="#ff0000"/>
    <rect x="8" y="12" width="4" height="4" fill="#ff0000"/><rect x="12" y="14" width="4" height="2" fill="#ff0000"/>
  </g>
  <!-- pink ghost -->
  <g transform="translate(208,28)">
    <rect width="16" height="4" fill="#ffb8ff"/>
    <rect x="0" y="4" width="16" height="8" fill="#ffb8ff"/>
    <rect x="2" y="6" width="4" height="4" fill="#fff"/><rect x="10" y="6" width="4" height="4" fill="#fff"/>
    <rect x="4" y="8" width="2" height="2" fill="#2121de"/><rect x="12" y="8" width="2" height="2" fill="#2121de"/>
    <rect x="0" y="12" width="4" height="4" fill="#ffb8ff"/><rect x="4" y="14" width="4" height="2" fill="#ffb8ff"/>
    <rect x="8" y="12" width="4" height="4" fill="#ffb8ff"/><rect x="12" y="14" width="4" height="2" fill="#ffb8ff"/>
  </g>
  <!-- cyan ghost -->
  <g transform="translate(248,28)">
    <rect width="16" height="4" fill="#00ffff"/>
    <rect x="0" y="4" width="16" height="8" fill="#00ffff"/>
    <rect x="2" y="6" width="4" height="4" fill="#fff"/><rect x="10" y="6" width="4" height="4" fill="#fff"/>
    <rect x="4" y="8" width="2" height="2" fill="#2121de"/><rect x="12" y="8" width="2" height="2" fill="#2121de"/>
    <rect x="0" y="12" width="4" height="4" fill="#00ffff"/><rect x="4" y="14" width="4" height="2" fill="#00ffff"/>
    <rect x="8" y="12" width="4" height="4" fill="#00ffff"/><rect x="12" y="14" width="4" height="2" fill="#00ffff"/>
  </g>
  <!-- orange ghost -->
  <g transform="translate(288,28)">
    <rect width="16" height="4" fill="#ffb852"/>
    <rect x="0" y="4" width="16" height="8" fill="#ffb852"/>
    <rect x="2" y="6" width="4" height="4" fill="#fff"/><rect x="10" y="6" width="4" height="4" fill="#fff"/>
    <rect x="4" y="8" width="2" height="2" fill="#2121de"/><rect x="12" y="8" width="2" height="2" fill="#2121de"/>
    <rect x="0" y="12" width="4" height="4" fill="#ffb852"/><rect x="4" y="14" width="4" height="2" fill="#ffb852"/>
    <rect x="8" y="12" width="4" height="4" fill="#ffb852"/><rect x="12" y="14" width="4" height="2" fill="#ffb852"/>
  </g>
  <!-- second pac facing left (mirror scene) -->
  <g transform="translate(360,28)" fill="#ffe100">
    <rect x="4" y="0" width="8" height="4"/><rect x="4" y="4" width="12" height="4"/>
    <rect x="8" y="8" width="8" height="4"/><rect x="4" y="12" width="8" height="4"/>
    <rect x="0" y="8" width="8" height="8"/>
    <rect x="0" y="4" width="4" height="12"/>
    <rect x="4" y="6" width="2" height="2" fill="#000"/>
  </g>
  <!-- frightened ghost (blue) -->
  <g transform="translate(328,28)">
    <rect width="16" height="4" fill="#2121de"/>
    <rect x="0" y="4" width="16" height="8" fill="#2121de"/>
    <rect x="3" y="7" width="3" height="3" fill="#fff"/><rect x="11" y="7" width="3" height="3" fill="#fff"/>
    <rect x="0" y="12" width="4" height="4" fill="#2121de"/><rect x="4" y="14" width="4" height="2" fill="#2121de"/>
    <rect x="8" y="12" width="4" height="4" fill="#2121de"/><rect x="12" y="14" width="4" height="2" fill="#2121de"/>
  </g>
</svg>