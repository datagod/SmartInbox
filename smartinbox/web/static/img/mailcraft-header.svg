      <rect x="0" y="0" width="8" height="8" fill="#8b8b8b"/>
      <rect x="8" y="8" width="8" height="8" fill="#6e6e6e"/>
      <rect x="3" y="10" width="2" height="2" fill="#5a5a5a"/>
      <rect x="11" y="3" width="2" height="2" fill="#9a9a9a"/>
    </pattern>
  </defs>
  <rect width="480" height="16" fill="url(#mc-grass)"/>
