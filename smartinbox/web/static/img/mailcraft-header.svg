<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 48" role="img" aria-label="MailCraft header">
  <defs>
    <pattern id="mc-grass" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#6b4423"/>
      <rect width="16" height="6" fill="#5d9e45"/>
      <rect x="2" y="1" width="3" height="2" fill="#7cbd56"/>
