<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SmartInbox">
  <defs>
    <linearGradient id="si-bg" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#243044"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="si-env" x1="32" y1="16" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ec0ff"/>
      <stop offset="55%" stop-color="#3d9eff"/>
      <stop offset="100%" stop-color="#2a6db8"/>
    </linearGradient>
    <linearGradient id="si-flap" x1="32" y1="18" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ed4ff"/>
      <stop offset="100%" stop-color="#4da8ff"/>
    </linearGradient>
    <linearGradient id="si-badge" x1="44" y1="10" x2="44" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2d42"/>
      <stop offset="100%" stop-color="#121b28"/>
    </linearGradient>
    <filter id="si-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#si-bg)"/>

  <!-- envelope body -->
  <path
    d="M11 25.5c0-2.5 2-4.5 4.5-4.5h33c2.5 0 4.5 2 4.5 4.5v23.5c0 2.5-2 4.5-4.5 4.5h-33c-2.5 0-4.5-2-4.5-4.5V25.5z"
    fill="url(#si-env)"
    stroke="#e86a6a"
    stroke-width="2.2"
    stroke-linejoin="round"
  />
  <path
    d="M15.5 49.5h33"
    stroke="#1a4f85"
    stroke-width="1.2"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- envelope flap -->
  <path
    d="M11 25.5 32 41.5 53 25.5Z"
    fill="url(#si-flap)"
    stroke="#e86a6a"
    stroke-width="2.2"
    stroke-linejoin="round"
  />
  <path
    d="M11 25.5 32 41.5 53 25.5"
    fill="none"
    stroke="#ff8a8a"
    stroke-width="1"
    stroke-linejoin="round"
    opacity="0.55"
  />

  <!-- subtle intelligence trace on the flap -->
  <g stroke="#4caf82" stroke-linecap="round" opacity="0.75">
    <circle cx="22.5" cy="33.5" r="1.8" fill="#4caf82" stroke="none"/>
    <circle cx="32" cy="36.2" r="2.1" fill="#63d69a" stroke="none"/>
    <circle cx="41.5" cy="33.5" r="1.8" fill="#4caf82" stroke="none"/>
    <path d="M24.3 34.2 29.2 35.6" stroke-width="1.1"/>
    <path d="M39.7 34.2 34.8 35.6" stroke-width="1.1"/>
  </g>

  <!-- AI smart-mail badge -->
  <circle cx="44.5" cy="17.5" r="12.5" fill="url(#si-badge)" stroke="#3d9eff" stroke-width="2.2" filter="url(#si-glow)"/>
  <circle cx="44.5" cy="17.5" r="9.2" fill="none" stroke="#5eb3ff" stroke-width="0.8" opacity="0.35"/>
  <text
    x="44.5"
    y="21.2"
    text-anchor="middle"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="11.5"
    font-weight="700"
    fill="#e7ecf3"
    letter-spacing="-0.2"
  >AI</text>

  <!-- tiny sparkle — mail just got smarter -->
  <path
    d="M54.8 11.2 55.6 13.2 57.6 14 55.6 14.8 54.8 16.8 54 14.8 52 14 54 13.2Z"
    fill="#e8b84a"
    opacity="0.95"
  />
</svg>