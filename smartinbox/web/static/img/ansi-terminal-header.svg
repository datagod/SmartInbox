<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 56" role="img" aria-label="ANSI terminal header">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- window chrome -->
  <rect width="480" height="56" fill="#101010"/>
  <rect x="1" y="1" width="478" height="54" fill="url(#screen)" stroke="#404040" stroke-width="1"/>
  <!-- title bar -->
  <rect x="1" y="1" width="478" height="20" fill="url(#titlebar)"/>
  <rect x="1" y="20" width="478" height="1" fill="#0a0a0a"/>
  <rect x="1" y="21" width="478" height="1" fill="#505050"/>
  <!-- window controls -->
  <g fill="#c0c0c0" font-family="Consolas, 'Liberation Mono', monospace" font-size="11" font-weight="700">
    <text x="452" y="15">─</text>
    <text x="464" y="15">□</text>
    <text x="474" y="15">×</text>
  </g>
  <!-- title bar icon + label -->
  <rect x="8" y="6" width="8" height="10" fill="#0a0a0a" stroke="#808080" stroke-width="1"/>
  <text x="11" y="14" fill="#23d18b" font-family="Consolas, 'Liberation Mono', monospace" font-size="8" font-weight="700">C:</text>
  <text x="22" y="15" fill="#e5e5e5" font-family="Consolas, 'Liberation Mono', monospace" font-size="10">ANSI Terminal — SmartInbox</text>
  <!-- header text -->
  <text x="240" y="38" text-anchor="middle" font-family="Consolas, 'Liberation Mono', 'DejaVu Sans Mono', monospace" font-size="12" font-weight="700" letter-spacing="0.04em">
    <tspan fill="#ffffff">SMARTINBOX</tspan>
    <tspan fill="#bc3fbc"> :: </tspan>
    <tspan fill="#29b8db">MAIL SUMMARY</tspan>
    <tspan fill="#2472c8"> [v1]</tspan>
  </text>
</svg>